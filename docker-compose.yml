version: "3.9"

services:
  tech-events-hub:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tech-events-hub
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TICKET_TAILOR_API_KEY=${TICKET_TAILOR_API_KEY}
      - DB_PATH=/app/data/events_hub.db
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  sqlite_data:
    driver: local
